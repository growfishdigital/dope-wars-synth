<script>
window.onerror = function(msg, src, line, col, err) {
  var el = document.getElementById('proto-root');
  if (el) el.innerHTML = '<div style="position:fixed;inset:0;background:#0a0118;display:flex;align-items:center;justify-content:center;padding:24px"><div style="font-family:monospace;color:#ff3366;max-width:600px;background:rgba(255,51,102,0.1);border:1px solid #ff3366;border-radius:8px;padding:24px"><div style="font-size:18px;font-weight:700;margin-bottom:12px">💥 Script Error</div><pre style="font-size:12px;white-space:pre-wrap;color:#fff;opacity:0.85">' + msg + '

' + src + ':' + line + ':' + col + (err && err.stack ? '

' + err.stack : '') + '</pre></div></div>';
};
window.addEventListener('unhandledrejection', function(e) {
  var el = document.getElementById('proto-root');
  if (el && el.querySelector('#proto-loading')) {
    el.innerHTML = '<div style="position:fixed;inset:0;background:#0a0118;display:flex;align-items:center;justify-content:center;padding:24px"><div style="font-family:monospace;color:#ff3366;max-width:600px;background:rgba(255,51,102,0.1);border:1px solid #ff3366;border-radius:8px;padding:24px"><div style="font-size:18px;font-weight:700;margin-bottom:12px">💥 Unhandled Promise</div><pre style="font-size:12px;white-space:pre-wrap;color:#fff;opacity:0.85">' + String(e.reason) + '</pre></div></div>';
  }
});
</script>

// Seeded RNG
function mulberry32(seed) {
  return function() {
    let t = seed += 0x6D2B79F5;
    t = Math.imul(t ^ (t >>> 15), t | 1);
    t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
function hashSeed(day, cityId) {
  let h = 2166136261;
  const s = `${day}-${cityId}`;
  for (let i = 0; i < s.length; i++) {
    h ^= s.charCodeAt(i);
    h = Math.imul(h, 16777619);
  }
  return h >>> 0;
}

const SPIKE_TYPES = [
  { kind: 'spike', tag: 'Cops raided supply', mul: [2.5, 4.5] },
  { kind: 'spike', tag: 'Festival nearby', mul: [1.8, 3.0] },
  { kind: 'spike', tag: 'Celeb overdose', mul: [2.0, 3.5] },
  { kind: 'crash', tag: 'Market flooded', mul: [0.25, 0.5] },
  { kind: 'crash', tag: 'Cartel dumping', mul: [0.3, 0.55] },
  { kind: 'crash', tag: 'Bad batch warning', mul: [0.35, 0.6] },
];

function generatePrices(day, cityId, drugs) {
  const rng = mulberry32(hashSeed(day, cityId));
  const bias = CITY_BIAS[cityId] || {};
  const spikes = {};
  const spikeCount = rng() < 0.7 ? (rng() < 0.5 ? 1 : 0) : 2;
  const pool = [...drugs];
  for (let i = 0; i < spikeCount; i++) {
    const drug = pool.splice(Math.floor(rng() * pool.length), 1)[0];
    const type = SPIKE_TYPES[Math.floor(rng() * SPIKE_TYPES.length)];
    const mul = type.mul[0] + rng() * (type.mul[1] - type.mul[0]);
    spikes[drug.id] = { mul, kind: type.kind, tag: type.tag };
  }
  const prices = {};
  drugs.forEach(d => {
    const base = d.min + rng() * (d.max - d.min);
    const biased = base * (bias[d.id] || 1);
    const spiked = spikes[d.id] ? biased * spikes[d.id].mul : biased;
    const rounded = Math.round(spiked / 10) * 10;
    const available = rng() > 0.15;
    prices[d.id] = { price: rounded, available, spike: spikes[d.id] || null };
  });
  return prices;
}

// Pick 3 unique Granny days from days 2–20
function makeGrannyDays() {
  const pool = Array.from({ length: 19 }, (_, i) => i + 2);
  const days = [];
  while (days.length < 3) {
    const idx = Math.floor(Math.random() * pool.length);
    days.push(pool.splice(idx, 1)[0]);
  }
  return days.sort((a, b) => a - b);
}

// Price Granny's one-use items at ~30% of cash, nicely rounded
function grannyItemPrice(cash) {
  const raw = Math.max(5000, cash * 0.30);
  if (raw >= 50000) return Math.round(raw / 10000) * 10000;
  if (raw >= 10000) return Math.round(raw / 5000) * 5000;
  return Math.round(raw / 1000) * 1000;
}

function storeReducer(state, action) {
  switch (action.type) {

    case 'START_GAME': {
      const s = makeInitialState();
      s.screen = 'market';
      s.log = [{ day: 1, text: `Landed in ${cityName(s.city)}. Trenchcoat empty. Shark wants ${fmt(s.debt)}.`, kind: 'intro' }];
      return s;
    }

    case 'BUY': {
      const { drugId, qty } = action;
      const p = state.prices[state.city][drugId];
      const cost = p.price * qty;
      if (cost > state.cash) return state;
      if (getLoad(state.inventory) + qty > state.trenchCapacity) return state;
      const existingQty = state.inventory[drugId] || 0;
      const existingBasis = state.costBasis[drugId] || 0;
      const newAvgBasis = existingQty > 0
        ? (existingQty * existingBasis + qty * p.price) / (existingQty + qty)
        : p.price;
      return {
        ...state,
        cash: state.cash - cost,
        inventory: { ...state.inventory, [drugId]: existingQty + qty },
        costBasis: { ...state.costBasis, [drugId]: newAvgBasis },
        log: [{ day: state.day, text: `Bought ${qty}× ${drugName(drugId)} @ ${fmt(p.price)} in ${cityName(state.city)}.`, kind: 'buy' }, ...state.log].slice(0, 60),
      };
    }

    case 'SELL': {
      const { drugId, qty } = action;
      const have = state.inventory[drugId] || 0;
      if (qty > have) return state;
      const p = state.prices[state.city][drugId];
      const revenue = p.price * qty;
      const inv = { ...state.inventory };
      inv[drugId] = have - qty;
      const newCostBasis = { ...state.costBasis };
      if (inv[drugId] <= 0) {
        delete inv[drugId];
        delete newCostBasis[drugId];
      }
      return {
        ...state,
        cash: state.cash + revenue,
        inventory: inv,
        costBasis: newCostBasis,
        log: [{ day: state.day, text: `Sold ${qty}× ${drugName(drugId)} @ ${fmt(p.price)} in ${cityName(state.city)}.`, kind: 'sell' }, ...state.log].slice(0, 60),
      };
    }

    case 'TRAVEL': {
      const newDay = state.day + 1;
      if (newDay > DW_CONFIG.totalDays) return endGame(state, 'win');
      const newCity = action.cityId;

      const prices = {};
      DW_CITIES.forEach(c => {
        prices[c.id] = generatePrices(newDay, c.id, DW_DRUGS);
      });

      const history = { ...state.priceHistory };
      if (!history[state.city]) history[state.city] = {};
      DW_DRUGS.forEach(d => {
        const arr = history[state.city][d.id] || [];
        arr.push(state.prices[state.city][d.id].price);
        history[state.city][d.id] = arr.slice(-14);
      });

      const newDebt = Math.round(state.debt * (1 + DW_CONFIG.debtInterest));
      const newBank = Math.round(state.bank * (1 + DW_CONFIG.bankInterest));
      const newHeat = Math.max(0, state.heat - 5);

      const messages = [...state.messages];
      if (Math.random() < 0.6) {
        const t = MESSAGE_BANK[Math.floor(Math.random() * MESSAGE_BANK.length)];
        const text = t.text.replace('{day}', newDay).replace('{debt}', fmt(newDebt));
        messages.unshift({ from: t.from, tag: t.tag, text, day: newDay, read: false });
      }

      const base = {
        ...state,
        day: newDay,
        city: newCity,
        prices,
        priceHistory: history,
        debt: newDebt,
        bank: newBank,
        heat: newHeat,
        messages: messages.slice(0, 30),
        pendingEvent: null,
        log: [{ day: newDay, text: `Flew to ${cityName(newCity)}. Day ${newDay} of ${DW_CONFIG.totalDays}.`, kind: 'travel' }, ...state.log].slice(0, 60),
      };

      // Granny visit takes priority over random events
      if (state.grannyDays.includes(newDay)) {
        return { ...base, screen: 'granny' };
      }

      if (Math.random() < DW_CONFIG.eventProbability) {
        const ev = pickWeightedEvent();
        return { ...base, pendingEvent: ev, screen: 'event' };
      }

      return { ...base, screen: 'endOfDay' };
    }

    case 'RESOLVE_EVENT': {
      const newState = applyConsequence(state, action.consequence);
      if (newState.screen === 'stripped') return newState;
      return { ...newState, pendingEvent: null, screen: 'endOfDay' };
    }

    case 'BUY_GRANNY': {
      const { item, price } = action;
      if (state.cash < price) return state;
      switch (item) {
        case 'backpack': {
          const newTier = state.backpackTier + 1;
          const newCap = DW_CONFIG.baseCapacity + newTier * 50;
          return {
            ...state,
            cash: state.cash - price,
            backpackTier: newTier,
            trenchCapacity: newCap,
            log: [{ day: state.day, text: `Granny's bag upgrade: +50 slots. Capacity now ${newCap}.`, kind: 'good' }, ...state.log].slice(0, 60),
          };
        }
        case 'gun':
          return {
            ...state,
            cash: state.cash - price,
            hasGun: true,
            log: [{ day: state.day, text: `Granny slid a piece across the table. 'One use, sweetie.'`, kind: 'good' }, ...state.log].slice(0, 60),
          };
        case 'copProtection':
          return {
            ...state,
            cash: state.cash - price,
            hasCopProtection: true,
            log: [{ day: state.day, text: `Granny handed you the badge. 'Flash it once. Then it's gone.'`, kind: 'good' }, ...state.log].slice(0, 60),
          };
        default:
          return state;
      }
    }

    case 'BORROW_SHARK': {
      const { amount } = action;
      const debtAdded = Math.round(amount * 1.1);
      const fromStripped = state.screen === 'stripped';
      return {
        ...state,
        cash: state.cash + amount,
        debt: state.debt + debtAdded,
        screen: fromStripped ? 'market' : state.screen,
        strippedReason: fromStripped ? null : state.strippedReason,
        log: [{ day: state.day, text: `Borrowed ${fmt(amount)} from the Shark. Debt +${fmt(debtAdded)}.`, kind: 'bad' }, ...state.log].slice(0, 60),
      };
    }

    case 'GOTO':
      return { ...state, screen: action.screen };

    case 'MARK_READ':
      return { ...state, messages: state.messages.map(m => ({ ...m, read: true })) };

    case 'PAY_DEBT': {
      const amt = Math.min(action.amount, state.cash, state.debt);
      return {
        ...state,
        cash: state.cash - amt,
        debt: state.debt - amt,
        log: [{ day: state.day, text: `Paid ${fmt(amt)} to the Shark.`, kind: 'debt' }, ...state.log].slice(0, 60),
      };
    }

    case 'DEPOSIT': {
      const amt = Math.min(action.amount, state.cash);
      return { ...state, cash: state.cash - amt, bank: state.bank + amt };
    }

    case 'WITHDRAW': {
      const amt = Math.min(action.amount, state.bank);
      return { ...state, cash: state.cash + amt, bank: state.bank - amt };
    }

    case 'RESET':
      return makeInitialState();

    case '__LOAD':
      return { ...makeInitialState(), ...action.state };

    default:
      return state;
  }
}

function endGame(state, how) {
  const netWorth = state.cash + state.bank - state.debt;
  const verdict = netWorth > 50000 ? 'legend' : netWorth > 10000 ? 'baller' : netWorth > 0 ? 'survivor' : 'broke';
  return { ...state, screen: 'gameover', gameOver: { how, netWorth, verdict } };
}

function stripped(state, reason) {
  return {
    ...state,
    cash: 0,
    inventory: {},
    costBasis: {},
    heat: 0,
    pendingEvent: null,
    screen: 'stripped',
    strippedReason: reason,
    log: [{ day: state.day, text: reason, kind: 'bad' }, ...state.log].slice(0, 60),
  };
}

function applyConsequence(state, key) {
  switch (key) {

    case 'loseCashOrStash': {
      const loss = Math.round(state.cash * 0.5);
      const newInv = { ...state.inventory };
      Object.keys(newInv).forEach(id => {
        const taken = Math.floor(newInv[id] * 0.25);
        newInv[id] = newInv[id] - taken;
        if (newInv[id] <= 0) delete newInv[id];
      });
      return {
        ...state,
        cash: state.cash - loss,
        inventory: newInv,
        health: Math.max(0, state.health - 10),
        log: [{ day: state.day, text: `Handed it over. Lost ${fmt(loss)} and a quarter of the stash.`, kind: 'bad' }, ...state.log],
      };
    }

    case 'fightMugger': {
      if (state.hasGun) {
        return {
          ...state,
          hasGun: false,
          log: [{ day: state.day, text: `You pulled the piece. Mugger bolted. Dropped the gun in the scramble — it's gone.`, kind: 'ok' }, ...state.log],
        };
      }
      if (Math.random() > 0.45) {
        return {
          ...state,
          health: Math.max(0, state.health - 25),
          log: [{ day: state.day, text: `Beat them back. Cracked rib. Nothing taken.`, kind: 'ok' }, ...state.log],
        };
      }
      return stripped(state, `Jumped and beaten. Lost everything.`);
    }

    case 'copCompliance': {
      if (state.hasCopProtection) {
        return {
          ...state,
          hasCopProtection: false,
          heat: Math.max(0, state.heat + 5),
          log: [{ day: state.day, text: `Flashed the badge. Cop nodded and walked. It's gone now.`, kind: 'ok' }, ...state.log],
        };
      }
      if (getLoad(state.inventory) > 0) {
        return stripped(state, `Cops found the stash. Everything confiscated.`);
      }
      return {
        ...state,
        heat: state.heat + 15,
        log: [{ day: state.day, text: `Clean pockets. Cops let you walk. Heat +15.`, kind: 'ok' }, ...state.log],
      };
    }

    case 'copFlee': {
      if (state.hasCopProtection) {
        return {
          ...state,
          hasCopProtection: false,
          heat: Math.max(0, state.heat + 10),
          log: [{ day: state.day, text: `Flashed the badge mid-chase. Cop stood down. Card's burned.`, kind: 'ok' }, ...state.log],
        };
      }
      if (Math.random() > 0.5) {
        return {
          ...state,
          heat: state.heat + 30,
          log: [{ day: state.day, text: `Lost them. For now. Heat +30.`, kind: 'ok' }, ...state.log],
        };
      }
      if (getLoad(state.inventory) > 0) {
        return stripped(state, `Caught. Cuffed. Everything confiscated.`);
      }
      const fine = Math.min(state.cash, 1500);
      return {
        ...state,
        cash: state.cash - fine,
        heat: state.heat + 40,
        log: [{ day: state.day, text: `Caught clean. ${fmt(fine)} fine. Heat +40.`, kind: 'bad' }, ...state.log],
      };
    }

    case 'friendDeal': {
      if (Math.random() > 0.4) {
        const affordable = DW_DRUGS.filter(d => d.max > 500);
        const drug = affordable[Math.floor(Math.random() * affordable.length)];
        const qty = 5;
        const space = state.trenchCapacity - getLoad(state.inventory);
        const actual = Math.min(qty, space);
        const cost = Math.round(drug.min * 0.6 * actual);
        if (cost > state.cash) {
          return { ...state, log: [{ day: state.day, text: `Couldn't afford the deal anyway.`, kind: 'ok' }, ...state.log] };
        }
        const existingQty = state.inventory[drug.id] || 0;
        const existingBasis = state.costBasis[drug.id] || 0;
        const unitCost = actual > 0 ? cost / actual : 0;
        const newBasis = existingQty > 0
          ? (existingQty * existingBasis + actual * unitCost) / (existingQty + actual)
          : unitCost;
        return {
          ...state,
          cash: state.cash - cost,
          inventory: { ...state.inventory, [drug.id]: existingQty + actual },
          costBasis: { ...state.costBasis, [drug.id]: newBasis },
          log: [{ day: state.day, text: `Got ${actual}× ${drug.name} at 40% off.`, kind: 'good' }, ...state.log],
        };
      }
      const loss = Math.min(state.cash, 800);
      return {
        ...state,
        cash: state.cash - loss,
        log: [{ day: state.day, text: `Old friend scammed you. Lost ${fmt(loss)}.`, kind: 'bad' }, ...state.log],
      };
    }

    case 'foundStash': {
      const affordable = DW_DRUGS.filter(d => d.tier !== 'low');
      const drug = affordable[Math.floor(Math.random() * affordable.length)];
      const qty = 3 + Math.floor(Math.random() * 5);
      const space = state.trenchCapacity - getLoad(state.inventory);
      const actual = Math.min(qty, space);
      return {
        ...state,
        inventory: { ...state.inventory, [drug.id]: (state.inventory[drug.id] || 0) + actual },
        heat: state.heat + 5,
        log: [{ day: state.day, text: `Found ${actual}× ${drug.name}. Felony.`, kind: 'good' }, ...state.log],
      };
    }

    case 'payHurricane':
      return {
        ...state,
        cash: state.cash - 800,
        log: [{ day: state.day, text: `Last flight out. -${fmt(800)}.`, kind: 'ok' }, ...state.log],
      };

    case 'skipDay':
      return {
        ...state,
        debt: Math.round(state.debt * (1 + DW_CONFIG.debtInterest)),
        log: [{ day: state.day, text: `Stuck an extra day. Debt grew.`, kind: 'bad' }, ...state.log],
      };

    case 'borrowShark':
      return {
        ...state,
        cash: state.cash + 5000,
        debt: state.debt + 5500,
        log: [{ day: state.day, text: `Borrowed ${fmt(5000)}. Owe ${fmt(5500)}. Smile.`, kind: 'bad' }, ...state.log],
      };

    case 'none':
    default:
      return state;
  }
}

// Helpers
function getLoad(inv) {
  return Object.values(inv).reduce((a, b) => a + b, 0);
}
function cityName(id) { return (DW_CITIES.find(c => c.id === id) || {}).name || id; }
function drugName(id) { return (DW_DRUGS.find(d => d.id === id) || {}).name || id; }
function drugOf(id)   { return DW_DRUGS.find(d => d.id === id); }
function fmt(n) {
  if (n === null || n === undefined || isNaN(n)) return '$0';
  const abs = Math.abs(n);
  const sign = n < 0 ? '-' : '';
  if (abs >= 1000000) return `${sign}$${(abs / 1000000).toFixed(1)}M`;
  if (abs >= 10000)   return `${sign}$${Math.round(abs / 1000)}k`;
  return `${sign}$${abs.toLocaleString('en-US', { maximumFractionDigits: 0 })}`;
}
function fmtFull(n) {
  if (n === null || n === undefined || isNaN(n)) return '$0';
  return `$${Math.round(n).toLocaleString('en-US')}`;
}

Object.assign(window, {
  DW_CONFIG, makeInitialState, storeReducer, generatePrices,
  getLoad, cityName, drugName, drugOf, fmt, fmtFull,
  EVENT_BANK, CONTACTS, MESSAGE_BANK, CITY_BIAS,
  grannyItemPrice, makeGrannyDays, pickWeightedEvent,
});

// proto-audio.jsx
// ═══════════════════════════════════════════════════════
// ═══════════════════════════════════════════════════════════
// proto-audio.jsx — WebAudio: synthwave ambient + UI sfx
// ═══════════════════════════════════════════════════════════

const DWAudio = (() => {
  let ctx = null;
  let masterGain = null;
  let ambientOn = false;
  let ambientNodes = [];
  let muted = localStorage.getItem('dw-muted') === '1';

  function ensure() {
    if (ctx) return ctx;
    const AC = window.AudioContext || window.webkitAudioContext;
    if (!AC) return null;
    ctx = new AC();
    masterGain = ctx.createGain();
    masterGain.gain.value = muted ? 0 : 0.6;
    masterGain.connect(ctx.destination);
    return ctx;
  }

  // ── UI sounds ────────────────────────────────────────────
  function tone(freq, dur = 0.12, type = 'sine', gain = 0.15, detune = 0) {
    const c = ensure();
    if (!c) return;
    const osc = c.createOscillator();
    const g = c.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    osc.detune.value = detune;
    g.gain.value = 0;
    g.gain.linearRampToValueAtTime(gain, c.currentTime + 0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, c.currentTime + dur);
    osc.connect(g); g.connect(masterGain);
    osc.start();
    osc.stop(c.currentTime + dur + 0.05);
  }

  function tap() {
    tone(880, 0.05, 'square', 0.06);
  }
  function confirm() {
    tone(523, 0.08, 'triangle', 0.1);
    setTimeout(() => tone(784, 0.1, 'triangle', 0.1), 60);
  }
  function cancel() {
    tone(400, 0.08, 'square', 0.08);
    setTimeout(() => tone(280, 0.12, 'square', 0.08), 50);
  }
  function cashRegister() {
    const c = ensure();
    if (!c) return;
    // Ching!
    [880, 1320, 1760].forEach((f, i) => {
      setTimeout(() => tone(f, 0.15, 'triangle', 0.12), i * 40);
    });
  }
  function buzz() {
    // Phone notification
    tone(1200, 0.06, 'square', 0.1);
    setTimeout(() => tone(900, 0.08, 'square', 0.1), 80);
  }
  function bigWin() {
    const notes = [523, 659, 784, 1047, 1319];
    notes.forEach((f, i) => setTimeout(() => tone(f, 0.2, 'triangle', 0.15), i * 90));
  }
  function lose() {
    const c = ensure();
    if (!c) return;
    [440, 330, 220, 165].forEach((f, i) => {
      setTimeout(() => tone(f, 0.3, 'sawtooth', 0.12), i * 120);
    });
  }
  function whoosh() {
    const c = ensure();
    if (!c) return;
    const osc = c.createOscillator();
    const g = c.createGain();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(200, c.currentTime);
    osc.frequency.exponentialRampToValueAtTime(1200, c.currentTime + 0.4);
    g.gain.value = 0.0001;
    g.gain.exponentialRampToValueAtTime(0.08, c.currentTime + 0.05);
    g.gain.exponentialRampToValueAtTime(0.0001, c.currentTime + 0.4);
    const filter = c.createBiquadFilter();
    filter.type = 'bandpass';
    filter.frequency.value = 800;
    filter.Q.value = 3;
    osc.connect(filter); filter.connect(g); g.connect(masterGain);
    osc.start();
    osc.stop(c.currentTime + 0.5);
  }

  // ── Synthwave ambient loop ───────────────────────────────
  // Slow pad + bass + arp. Plays in a loop.
  function startAmbient() {
    const c = ensure();
    if (!c || ambientOn) return;
    ambientOn = true;

    const ambientGain = c.createGain();
    ambientGain.gain.value = 0;
    ambientGain.gain.linearRampToValueAtTime(0.35, c.currentTime + 2);
    ambientGain.connect(masterGain);

    // Pad — two detuned saws with lowpass sweep
    const padA = c.createOscillator();
    const padB = c.createOscillator();
    padA.type = 'sawtooth'; padB.type = 'sawtooth';
    padA.frequency.value = 110; // A
    padB.frequency.value = 110; padB.detune.value = 12;
    const padFilter = c.createBiquadFilter();
    padFilter.type = 'lowpass';
    padFilter.frequency.value = 400;
    padFilter.Q.value = 6;
    const padGain = c.createGain();
    padGain.gain.value = 0.07;

    // LFO to sweep pad filter
    const lfo = c.createOscillator();
    const lfoGain = c.createGain();
    lfo.frequency.value = 0.08;
    lfoGain.gain.value = 600;
    lfo.connect(lfoGain); lfoGain.connect(padFilter.frequency);

    padA.connect(padFilter); padB.connect(padFilter);
    padFilter.connect(padGain); padGain.connect(ambientGain);

    // Bass — pulse on 1 and 3
    const bassNotes = [55, 55, 73, 65]; // A, A, D, E
    let bassIdx = 0;
    function pulseBass() {
      if (!ambientOn) return;
      const osc = c.createOscillator();
      const g = c.createGain();
      osc.type = 'triangle';
      osc.frequency.value = bassNotes[bassIdx % bassNotes.length];
      bassIdx++;
      g.gain.value = 0;
      const now = c.currentTime;
      g.gain.linearRampToValueAtTime(0.12, now + 0.05);
      g.gain.exponentialRampToValueAtTime(0.001, now + 1.3);
      osc.connect(g); g.connect(ambientGain);
      osc.start(now);
      osc.stop(now + 1.4);
    }

    // Arp — minor pentatonic
    const arpFreqs = [440, 523, 659, 784, 880, 784, 659, 523]; // A C E G A G E C
    let arpIdx = 0;
    function pulseArp() {
      if (!ambientOn) return;
      const osc = c.createOscillator();
      const g = c.createGain();
      osc.type = 'square';
      osc.frequency.value = arpFreqs[arpIdx % arpFreqs.length];
      arpIdx++;
      const now = c.currentTime;
      g.gain.value = 0;
      g.gain.linearRampToValueAtTime(0.04, now + 0.01);
      g.gain.exponentialRampToValueAtTime(0.001, now + 0.18);
      const filter = c.createBiquadFilter();
      filter.type = 'lowpass';
      filter.frequency.value = 1800;
      osc.connect(filter); filter.connect(g); g.connect(ambientGain);
      osc.start(now);
      osc.stop(now + 0.2);
    }

    padA.start(); padB.start(); lfo.start();

    const bassInterval = setInterval(pulseBass, 1400);
    const arpInterval = setInterval(pulseArp, 350);

    ambientNodes = [padA, padB, lfo, ambientGain, bassInterval, arpInterval];
  }

  function stopAmbient() {
    if (!ambientOn) return;
    ambientOn = false;
    const [padA, padB, lfo, g, bi, ai] = ambientNodes;
    clearInterval(bi); clearInterval(ai);
    const c = ctx;
    try {
      g.gain.linearRampToValueAtTime(0, c.currentTime + 0.5);
      setTimeout(() => {
        try { padA.stop(); padB.stop(); lfo.stop(); } catch (e) {}
      }, 600);
    } catch (e) {}
    ambientNodes = [];
  }

  function setMuted(m) {
    muted = m;
    localStorage.setItem('dw-muted', m ? '1' : '0');
    if (masterGain) {
      masterGain.gain.linearRampToValueAtTime(m ? 0 : 0.6, ctx.currentTime + 0.1);
    }
  }
  function isMuted() { return muted; }
  function isAmbientOn() { return ambientOn; }

  return { ensure, tap, confirm, cancel, cashRegister, buzz, bigWin, lose, whoosh, startAmbient, stopAmbient, setMuted, isMuted, isAmbientOn };
})();

Object.assign(window, { DWAudio });

// Neon CTA button
function NeonBtn({ children, color = DW.magenta, onClick, disabled, style = {}, small, ghost }) {
  const [pressed, setPressed] = React.useState(false);
  return (
    <button
      onPointerDown={() => { setPressed(true); DWAudio.tap(); }}
      onPointerUp={() => setPressed(false)}
      onPointerLeave={() => setPressed(false)}
      onClick={onClick}
      disabled={disabled}
      style={{
        appearance: 'none', border: `1.5px solid ${color}`,
        background: ghost ? 'transparent' : pressed ? color : `${color}22`,
        color: ghost ? color : pressed ? '#14052a' : '#fff',
        padding: small ? '8px 14px' : '14px 22px',
        fontFamily: DW.display, fontWeight: 800, letterSpacing: '0.08em',
        fontSize: small ? 12 : 14, textTransform: 'uppercase', cursor: 'pointer',
        borderRadius: 2, transition: 'all 120ms',
        boxShadow: pressed ? `0 0 28px ${color}aa` : `0 0 12px ${color}66`,
        opacity: disabled ? 0.35 : 1,
        transform: pressed ? 'translateY(1px)' : 'none',
        ...style,
      }}
    >
      {children}
    </button>
  );
}

// Stepper control (+/-) with quick actions
function Stepper({ value, onChange, min = 0, max = 99, step = 1, color = DW.magenta }) {
  const inc = () => { DWAudio.tap(); onChange(Math.min(max, value + step)); };
  const dec = () => { DWAudio.tap(); onChange(Math.max(min, value - step)); };
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 14 }}>
      <button onClick={dec} disabled={value <= min}
        style={stepBtnStyle(color, value <= min)}>−</button>
      <div style={{
        fontFamily: DW.display, fontSize: 32, color: '#fff',
        minWidth: 70, textAlign: 'center',
        textShadow: `0 0 20px ${color}`,
      }}>{value}</div>
      <button onClick={inc} disabled={value >= max}
        style={stepBtnStyle(color, value >= max)}>+</button>
    </div>
  );
}
function stepBtnStyle(color, disabled) {
  return {
    width: 44, height: 44, borderRadius: '50%',
    border: `1.5px solid ${color}`, background: `${color}22`,
    color: '#fff', fontSize: 24, fontWeight: 600, cursor: 'pointer',
    display: 'flex', alignItems: 'center', justifyContent: 'center',
    boxShadow: `0 0 12px ${color}55`, opacity: disabled ? 0.3 : 1,
  };
}

// Slider — big, tactile
function BigSlider({ value, onChange, min = 0, max = 100, color = DW.magenta }) {
  const trackRef = React.useRef(null);
  const pct = max > min ? (value - min) / (max - min) * 100 : 0;
  const handleDrag = (clientX) => {
    const rect = trackRef.current.getBoundingClientRect();
    const p = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
    const v = Math.round(min + p * (max - min));
    onChange(v);
  };
  return (
    <div
      ref={trackRef}
      onPointerDown={(e) => {
        e.currentTarget.setPointerCapture(e.pointerId);
        DWAudio.tap();
        handleDrag(e.clientX);
      }}
      onPointerMove={(e) => { if (e.buttons) handleDrag(e.clientX); }}
      style={{
        position: 'relative', height: 48, borderRadius: 24,
        background: 'rgba(255,255,255,0.06)', cursor: 'pointer',
        border: '1px solid rgba(255,255,255,0.12)',
      }}
    >
      <div style={{
        position: 'absolute', left: 0, top: 0, bottom: 0,
        width: `${pct}%`,
        background: `linear-gradient(90deg, ${color}88, ${color})`,
        borderRadius: 24, boxShadow: `0 0 20px ${color}99`,
      }}/>
      <div style={{
        position: 'absolute', left: `calc(${pct}% - 18px)`, top: 6,
        width: 36, height: 36, borderRadius: '50%',
        background: '#fff', boxShadow: `0 0 14px ${color}, 0 0 30px ${color}66`,
        border: `2px solid ${color}`,
      }}/>
    </div>
  );
}

// Animated number (cash counter)
function AnimatedNum({ value, format = fmt, duration = 500 }) {
  const [display, setDisplay] = React.useState(value);
  const fromRef = React.useRef(value);
  const rafRef = React.useRef(null);
  React.useEffect(() => {
    const from = fromRef.current;
    const to = value;
    if (from === to) return;
    const start = performance.now();
    function step(now) {
      const t = Math.min(1, (now - start) / duration);
      const eased = 1 - Math.pow(1 - t, 3);
      const cur = from + (to - from) * eased;
      setDisplay(cur);
      if (t < 1) rafRef.current = requestAnimationFrame(step);
      else { fromRef.current = to; setDisplay(to); }
    }
    rafRef.current = requestAnimationFrame(step);
    return () => cancelAnimationFrame(rafRef.current);
  }, [value]);
  return <>{format(display)}</>;
}

// Spark line (price history mini-chart)
function Spark({ values, color, width = 40, height = 16 }) {
  if (!values || values.length < 2) {
    return <div style={{ width, height, opacity: 0.3, fontFamily: DW.mono, fontSize: 9, color }}>—</div>;
  }
  const min = Math.min(...values);
  const max = Math.max(...values);
  const range = max - min || 1;
  const pts = values.map((v, i) => {
    const x = (i / (values.length - 1)) * width;
    const y = height - ((v - min) / range) * height;
    return `${x},${y}`;
  }).join(' ');
  const last = values[values.length - 1];
  const prev = values[values.length - 2];
  const up = last >= prev;
  return (
    <svg width={width} height={height} style={{ overflow: 'visible' }}>
      <polyline points={pts} fill="none" stroke={color} strokeWidth="1.5" opacity="0.85" />
      <circle cx={width} cy={height - ((last - min) / range) * height} r="1.8"
              fill={up ? DW.good : DW.danger}
              style={{ filter: `drop-shadow(0 0 4px ${up ? DW.good : DW.danger})` }}/>
    </svg>
  );
}

function Toast({ msg, color = DW.magenta, onDone }) {

    if (!msg) return;

    return () => clearTimeout(t);
  }, [msg]);
  if (!msg) return null;
  return (
    <div style={{
      position: 'absolute', top: 110, left: '50%', transform: 'translateX(-50%)',
      zIndex: 50,

// proto-music.jsx — persistent music player bar
// ═══════════════════════════════════════════════════════════

const TRACKS = [
  { file: 'Neon Gated Snare.mp3',     title: 'Running from the Feds' },
  { file: 'Neon Gated Snare (1).mp3', title: 'Trenchcoat Full of Feelings' },
  { file: 'Neon Gated Snare (2).mp3', title: 'The Loan Shark Mambo' },
  { file: 'Neon Gated Snare (3).mp3', title: "Granny's Neon Night" },
  { file: 'Neon Gated Snare (4).mp3', title: 'Heat Wave (Miami Vice Squad)' },
  { file: 'Neon Gated Snare (5).mp3', title: 'Last Flight to Nowhere' },
];

function trackUrl(file) {
  return file.replace(/ /g, '%20');
}

function MusicPlayer({ muted, onMuteToggle, gameStarted }) {
  const [trackIdx, setTrackIdx] = React.useState(0);
  const [playing, setPlaying] = React.useState(false);
  const [coverArt, setCoverArt] = React.useState(null);
  const audioRef = React.useRef(null);
  const autoStartedRef = React.useRef(false);

  const track = TRACKS[trackIdx];

  // Auto-play when game starts (runs within the user gesture context)
  React.useEffect(() => {
    if (!gameStarted || autoStartedRef.current) return;
    autoStartedRef.current = true;
    const audio = audioRef.current;
    if (!audio) return;
    DWAudio.stopAmbient();
    audio.src = trackUrl(track.file);
    audio.muted = muted;
    audio.play().then(() => setPlaying(true)).catch(() => {});
  }, [gameStarted]);

  // Auto-advance on track end
  React.useEffect(() => {
    const audio = audioRef.current;
    if (!audio) return;
    const onEnded = () => setTrackIdx(i => (i + 1) % TRACKS.length);
    audio.addEventListener('ended', onEnded);
    return () => audio.removeEventListener('ended', onEnded);
  }, []);

  // Change track
  React.useEffect(() => {
    const audio = audioRef.current;
    if (!audio) return;
    audio.src = trackUrl(track.file);
    audio.muted = muted;
    if (playing) audio.play().catch(() => setPlaying(false));
  }, [trackIdx]);

  // Sync mute
  React.useEffect(() => {
    if (audioRef.current) audioRef.current.muted = muted;
  }, [muted]);

  // Load cover art via jsmediatags
  React.useEffect(() => {
    setCoverArt(null);
    if (typeof jsmediatags === 'undefined') return;
    try {
      jsmediatags.read(trackUrl(track.file), {
        onSuccess: (tag) => {
          const pic = tag.tags.picture;
          if (!pic) return;
          let str = '';
          for (let i = 0; i < pic.data.length; i++) str += String.fromCharCode(pic.data[i]);
          setCoverArt(`data:${pic.format};base64,${btoa(str)}`);
        },
        onError: () => {},
      });
    } catch (e) {}
  }, [trackIdx]);

  const togglePlay = () => {
    const audio = audioRef.current;
    if (!audio) return;
    if (playing) {
      audio.pause();
      setPlaying(false);
    } else {
      DWAudio.stopAmbient();
      audio.play().then(() => setPlaying(true)).catch(() => {});
    }
  };

  const skip = (dir) => setTrackIdx(i => (i + dir + TRACKS.length) % TRACKS.length);

  return (
    <div style={{
      position: 'absolute', top: 0, left: 0, right: 0, height: 52,
      zIndex: 60,
      display: 'flex', alignItems: 'center', gap: 8,
      padding: '0 10px',
      background: 'rgba(10,1,24,0.95)',
      borderBottom: `1px solid ${DW.magenta}44`,
      backdropFilter: 'blur(12px)', WebkitBackdropFilter: 'blur(12px)',
      boxShadow: `0 2px 20px rgba(0,0,0,0.4)`,
    }}>
      <audio ref={audioRef} />

      {/* Album art */}
      <div style={{
        width: 36, height: 36, borderRadius: 4, flexShrink: 0,
        overflow: 'hidden', background: `${DW.magenta}22`,
        border: `1px solid ${DW.magenta}55`,
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        boxShadow: playing ? `0 0 10px ${DW.magenta}88` : 'none',
        transition: 'box-shadow 300ms',
      }}>
        {coverArt
          ? <img src={coverArt} alt="" style={{ width: '100%', height: '100%', objectFit: 'cover' }} />
          : <span style={{ fontSize: 18 }}>🎵</span>
        }
      </div>

      {/* Controls */}
      <MusicBtn onClick={() => skip(-1)} title="Previous">⏮</MusicBtn>
      <MusicBtn onClick={togglePlay} highlight={playing} title={playing ? 'Pause' : 'Play'}>
        {playing ? '⏸' : '▶'}
      </MusicBtn>
      <MusicBtn onClick={() => skip(1)} title="Next">⏭</MusicBtn>

      {/* Track name — scrolling marquee */}
      <div style={{
        flex: 1, overflow: 'hidden', position: 'relative',
        maskImage: 'linear-gradient(90deg, transparent 0%, black 8%, black 92%, transparent 100%)',
        WebkitMaskImage: 'linear-gradient(90deg, transparent 0%, black 8%, black 92%, transparent 100%)',
      }}>
        <div style={{
          display: 'inline-block',
          whiteSpace: 'nowrap',
          fontFamily: DW.display, fontWeight: 700,
          fontSize: 11, color: '#fff',
          textTransform: 'uppercase', letterSpacing: '0.06em',
          animation: playing ? 'dw-marquee 14s linear infinite' : 'none',
          paddingLeft: playing ? 0 : 4,
        }}>
          {playing ? `${track.title}  ·  ${track.title}  ·  ` : track.title}
        </div>
        {!playing && (
          <div style={{
            fontFamily: DW.mono, fontSize: 9,
            color: 'rgba(255,255,255,0.4)', letterSpacing: '0.12em',
            textTransform: 'uppercase', marginTop: 2, paddingLeft: 4,
          }}>{trackIdx + 1} / {TRACKS.length}</div>
        )}
      </div>

      {/* Track counter when playing */}
      {playing && (
        <div style={{
          fontFamily: DW.mono, fontSize: 9,
          color: 'rgba(255,255,255,0.4)', letterSpacing: '0.1em',
          flexShrink: 0,
        }}>{trackIdx + 1}/{TRACKS.length}</div>
      )}

      {/* Mute */}
      <MusicBtn onClick={onMuteToggle} title={muted ? 'Unmute' : 'Mute'}>
        {muted ? '🔇' : '🔊'}
      </MusicBtn>
    </div>
  );
}

function MusicBtn({ children, onClick, highlight, title }) {
  return (
    <button
      onClick={onClick}
      title={title}
      style={{
        background: highlight ? `${DW.magenta}33` : 'transparent',
        border: `1px solid ${highlight ? DW.magenta : 'rgba(255,255,255,0.18)'}`,
        color: '#fff', width: 28, height: 28, borderRadius: 4,
        fontSize: 13, cursor: 'pointer', padding: 0, flexShrink: 0,
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        boxShadow: highlight ? `0 0 10px ${DW.magenta}77` : 'none',
        transition: 'all 150ms',
      }}
    >{children}</button>
  );
}

Object.assign(window, { MusicPlayer, TRACKS });

          }}>{city.code} · {city.tz} · {city.temp}°F</div>

            fontFamily: DW.display, fontSize: 28, fontWeight: 800,

            lineHeight: 1,
          }}>{city.name}</div>
          <div style={{
            fontFamily: DW.body, fontSize: 11, color: 'rgba(255,255,255,0.55)',
            marginTop: 4, fontStyle: 'italic',
          }}>"{city.mood}"</div>
        </div>

        {layout === 'list' && (
          <MarketList state={state} prices={prices} onOpenTrade={onOpenTrade} />
        )}
        {layout === 'grid' && (
          <MarketGrid state={state} prices={prices} onOpenTrade={onOpenTrade} />
        )}
        {layout === 'ticker' && (
          <MarketTicker state={state} prices={prices} onOpenTrade={onOpenTrade} />
        )}
      </div>
    </div>
  );
}

// Ticker variant — scrolling Bloomberg style
function MarketTicker({ state, prices, onOpenTrade }) {
  const history = state.priceHistory[state.city] || {};
  return (
    <div style={{ display: 'flex', flexDirection: 'column' }}>
      {DW_DRUGS.map((drug, i) => {
        const p = prices[drug.id];
        const prev = (history[drug.id] || [])[history[drug.id]?.length - 1];
        const change = prev ? ((p.price - prev) / prev * 100) : 0;
        const held = state.inventory[drug.id] || 0;
        const up = change >= 0;
        const color = p.spike?.kind === 'spike' ? DW.lime :
                      p.spike?.kind === 'crash' ? DW.cyan :
                      up ? DW.good : DW.danger;
        return (
          <button
            key={drug.id}
            onClick={() => { DWAudio.tap(); onOpenTrade(drug.id); }}
            disabled={!p.available}
            style={{
              display: 'grid',
              gridTemplateColumns: '24px 1fr 50px 50px 50px',
              alignItems: 'center', gap: 8,
              padding: '8px 10px',
              background: i % 2 === 0 ? 'rgba(255,255,255,0.02)' : 'transparent',
              borderBottom: '1px solid rgba(255,255,255,0.05)',
              color: '#fff', cursor: p.available ? 'pointer' : 'not-allowed',
              opacity: p.available ? 1 : 0.3,
              fontFamily: DW.mono,
              textAlign: 'left',
            }}
          >
            <div style={{ fontSize: 16 }}>{drug.emoji}</div>
            <div>
              <div style={{
                fontFamily: DW.display, fontSize: 13, fontWeight: 700,
                textTransform: 'uppercase', letterSpacing: '0.05em',
              }}>{drug.name}</div>
              {held > 0 && <div style={{ fontSize: 8, color: DW.magenta }}>×{held}</div>}
            </div>
            <div style={{
              fontSize: 13, fontFamily: DW.display, fontWeight: 800,
              color, textAlign: 'right',
            }}>{fmt(p.price)}</div>
            <div style={{
              fontSize: 10, color, textAlign: 'right',
            }}>
              {up ? '▲' : '▼'} {Math.abs(change).toFixed(1)}%
            </div>
            <div style={{ display: 'flex', justifyContent: 'flex-end' }}>
              <Spark values={history[drug.id]} color={color} width={42} height={14}/>
            </div>
          </button>
        );
      })}
    </div>
  );
}

// ── Buy/Sell Trade Sheet ───────────────────────────────────
function TradeSheet({ state, dispatch, tradeCtx, onClose }) {
  const [mode, setMode] = React.useState('buy');
  const [qty, setQty] = React.useState(1);

  const id = tradeCtx?.drugId;
  React.useEffect(() => {
    setMode('buy');
    setQty(1);
  }, [id]);

  // Always render (Sheet handles closed state via transform) — but we need drug data
  // Use fallback drug/price when tradeCtx null so hooks stay consistent
  const drug = id ? drugOf(id) : DW_DRUGS[0];
  const p = id ? state.prices[state.city][drug.id] : { price: 0, available: true };
  const held = id ? (state.inventory[drug.id] || 0) : 0;
  const load = getLoad(state.inventory);
  const cap = state.trenchCapacity || DW_CONFIG.baseCapacity;
  const space = cap - load;
  const maxBuy = p.price > 0 ? Math.min(space, Math.floor(state.cash / p.price)) : 0;
  const maxSell = held;
  const max = mode === 'buy' ? maxBuy : maxSell;
  const safeQty = Math.min(Math.max(0, isNaN(qty) ? 0 : qty), isNaN(max) ? 0 : max);
  const total = p.price * safeQty;

  // Cost basis & P&L for sell mode
  const basisPerUnit = (state.costBasis && state.costBasis[drug?.id]) || 0;
  const pnlPerUnit = p.price - basisPerUnit;
  const totalPnl = pnlPerUnit * safeQty;
  const isProfitable = pnlPerUnit >= 0;

  const color = p.spike?.kind === 'spike' ? DW.lime :
                p.spike?.kind === 'crash' ? DW.cyan : DW.magenta;

  const exec = () => {
    if (!Number.isFinite(safeQty) || safeQty <= 0 || safeQty > max) return;
    if (mode === 'buy') {
      dispatch({ type: 'BUY', drugId: drug.id, qty: safeQty });
      DWAudio.cashRegister();
    } else {
      dispatch({ type: 'SELL', drugId: drug.id, qty: safeQty });
      DWAudio.cashRegister();
    }
    onClose();
  };

  return (
    <Sheet open={!!tradeCtx} onClose={onClose} color={color}>
      <div style={{
        display: 'flex', alignItems: 'center', gap: 12,
        marginBottom: 14, marginTop: -6,
      }}>
        <div style={{
          fontSize: 42, lineHeight: 1,
          filter: `drop-shadow(0 0 16px ${color})`,
        }}>{drug.emoji}</div>
        <div style={{ flex: 1 }}>
          <div style={{
            fontFamily: DW.display, fontWeight: 800, fontSize: 22,
            color: '#fff', textTransform: 'uppercase', lineHeight: 1,
          }}>{drug.name}</div>
          <div style={{
            fontFamily: DW.mono, fontSize: 10,
            color: 'rgba(255,255,255,0.5)', marginTop: 3,
            letterSpacing: '0.1em', textTransform: 'uppercase',
          }}>{cityName(state.city)} · Day {state.day}</div>
          {p.spike && (
            <div style={{
              fontFamily: DW.mono, fontSize: 10,
              color, textTransform: 'uppercase',
              letterSpacing: '0.1em', marginTop: 4,
              animation: 'dw-pulse 1.2s infinite',
            }}>◉ {p.spike.tag} — {p.spike.kind === 'spike' ? 'spiked' : 'crashed'}</div>
          )}
          {mode === 'sell' && basisPerUnit > 0 && (
            <div style={{
              fontFamily: DW.mono, fontSize: 9, marginTop: 4,
              color: isProfitable ? DW.good : DW.danger,
              letterSpacing: '0.1em', textTransform: 'uppercase',
            }}>Bought @ {fmt(basisPerUnit)}/unit</div>
          )}
        </div>
        <div style={{ textAlign: 'right' }}>
          <div style={{
            fontFamily: DW.display, fontSize: 20, fontWeight: 800, color,
            textShadow: `0 0 12px ${color}`,
          }}>{fmt(p.price)}</div>
          <div style={{ fontSize: 8, fontFamily: DW.mono, color: 'rgba(255,255,255,0.4)',
                        letterSpacing: '0.14em' }}>PER UNIT</div>
        </div>
      </div>

      {/* Mode toggle */}
      <div style={{ display: 'flex', gap: 6, marginBottom: 16 }}>
        {['buy', 'sell'].map(m => (
          <button
            key={m}
            onClick={() => { DWAudio.tap(); setMode(m); setQty(1); }}
            style={{
              flex: 1, padding: '8px', border: '1px solid',
              borderColor: mode === m ? (m === 'buy' ? DW.lime : DW.magenta) : 'rgba(255,255,255,0.12)',
              background: mode === m ? (m === 'buy' ? DW.lime+'22' : DW.magenta+'22') : 'transparent',
              color: '#fff', fontFamily: DW.display, fontWeight: 700, fontSize: 12,
              textTransform: 'uppercase', letterSpacing: '0.1em', borderRadius: 3,
              cursor: 'pointer',
              boxShadow: mode === m ? `0 0 14px ${m === 'buy' ? DW.lime : DW.magenta}55` : 'none',
            }}
          >
            {m === 'buy' ? `Buy (${fmt(state.cash)} cash)` : `Sell (Holding ${held})`}
          </button>
        ))}
      </div>

      {/* Qty */}
      <div style={{ marginBottom: 16 }}>
        <BigSlider
          value={safeQty}
          onChange={setQty}
          min={0}
          max={Math.max(1, max)}
          color={color}
        />
        <div style={{
          display: 'flex', justifyContent: 'space-between', marginTop: 8,
          fontFamily: DW.mono, fontSize: 10, color: 'rgba(255,255,255,0.5)',
          letterSpacing: '0.12em', textTransform: 'uppercase',
        }}>
          <span>0</span>
          <span style={{
            fontFamily: DW.display, fontSize: 28, color: '#fff',
            textShadow: `0 0 14px ${color}`, fontWeight: 800,
          }}>{safeQty}</span>
          <span>MAX {max}</span>
        </div>
      </div>

      {/* Quick qty */}
      <div style={{ display: 'flex', gap: 4, marginBottom: 20 }}>
        {[
          { label: '−10', act: () => setQty(Math.max(0, safeQty - 10)) },
          { label: '−1',  act: () => setQty(Math.max(0, safeQty - 1)) },
          { label: '+1',  act: () => setQty(Math.min(max, safeQty + 1)) },
          { label: '+10', act: () => setQty(Math.min(max, safeQty + 10)) },
          { label: 'MAX', act: () => setQty(max) },
        ].map(b => (
          <button key={b.label} onClick={() => { DWAudio.tap(); b.act(); }}
            style={{
              flex: 1, padding: '6px 0', border: '1px solid rgba(255,255,255,0.12)',
              background: 'rgba(255,255,255,0.03)', color: '#fff',
              fontFamily: DW.mono, fontSize: 10, letterSpacing: '0.08em',
              borderRadius: 2, cursor: 'pointer', fontWeight: 700,
            }}
          >{b.label}</button>
        ))}
      </div>

      {/* Preview */}
      <div style={{
        padding: '12px 14px', marginBottom: 16,
        background: 'rgba(255,255,255,0.03)',
        border: `1px solid ${color}44`, borderRadius: 3,
      }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
          <div>
            <div style={{
              fontFamily: DW.mono, fontSize: 9, color: 'rgba(255,255,255,0.5)',
              letterSpacing: '0.14em', textTransform: 'uppercase',
            }}>{mode === 'buy' ? 'Total cost' : 'You receive'}</div>
            <div style={{
              fontFamily: DW.display, fontWeight: 800, fontSize: 28, color: '#fff',
              textShadow: `0 0 14px ${mode === 'buy' ? DW.danger : DW.good}`,
            }}>{mode === 'buy' ? '−' : '+'}{fmtFull(total)}</div>
            {mode === 'sell' && basisPerUnit > 0 && safeQty > 0 && (
              <div style={{
                fontFamily: DW.display, fontWeight: 700, fontSize: 14, marginTop: 4,
                color: isProfitable ? DW.good : DW.danger,
                textShadow: `0 0 10px ${isProfitable ? DW.good : DW.danger}`,
              }}>
                {isProfitable ? '▲' : '▼'} {isProfitable ? '+' : ''}{fmtFull(totalPnl)} P&amp;L
              </div>
            )}
          </div>
          <div style={{ textAlign: 'right' }}>
            <div style={{
              fontFamily: DW.mono, fontSize: 9, color: 'rgba(255,255,255,0.5)',
              letterSpacing: '0.14em', textTransform: 'uppercase',
            }}>After</div>
            <div style={{ fontFamily: DW.display, fontWeight: 700, fontSize: 16, color: DW.lime }}>
              {fmtFull(mode === 'buy' ? state.cash - total : state.cash + total)}
            </div>
            <div style={{ fontFamily: DW.mono, fontSize: 10, color: 'rgba(255,255,255,0.5)', marginTop: 2 }}>
              load {mode === 'buy' ? load + safeQty : load - safeQty}/{cap}
            </div>
          </div>
        </div>
      </div>

      <NeonBtn
        color={mode === 'buy' ? DW.lime : DW.magenta}
        disabled={safeQty <= 0 || safeQty > max}
        onClick={exec}
        style={{ width: '100%' }}
      >
        {mode === 'buy' ? `Buy ${safeQty}× ${drug.name}` : `Sell ${safeQty}× ${drug.name}`}
      </NeonBtn>
    </Sheet>
  );
}

// Grid variant — pure data table
function TravelGrid({ state, selected, onSelect }) {
  // For each city, compute avg price vs current city to hint arbitrage
  const currentPrices = state.prices[state.city];
  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>
      {DW_CITIES.map(city => {
        const here = city.id === state.city;
        const sel = selected === city.id;
        const prices = state.prices[city.id];
        // pick top 3 deltas for items you're holding
        const holds = Object.keys(state.inventory).filter(k => state.inventory[k] > 0);
        let bestDelta = 0, bestDrug = null;
        holds.forEach(id => {
          const delta = prices[id].price - currentPrices[id].price;
          if (delta > bestDelta) { bestDelta = delta; bestDrug = id; }
        });
        return (
          <button
            key={city.id}
            onClick={() => { DWAudio.tap(); onSelect(city.id); }}
            style={{
              display: 'grid', gridTemplateColumns: '22px 1fr auto 44px',
              alignItems: 'center', gap: 10,
              padding: '10px 12px',
              background: sel ? `${city.accent}22` : 'rgba(255,255,255,0.03)',
              border: sel ? `1px solid ${city.accent}` : here ? `1px solid ${DW.lime}88` : '1px solid rgba(255,255,255,0.08)',
              borderRadius: 3, color: '#fff', textAlign: 'left',
              cursor: 'pointer',
              boxShadow: sel ? `0 0 16px ${city.accent}66` : 'none',
            }}
          >
            <div style={{
              width: 16, height: 16, borderRadius: '50%',
              background: city.accent, boxShadow: `0 0 10px ${city.accent}`,
            }}/>
            <div>
              <div style={{
                fontFamily: DW.display, fontSize: 15, fontWeight: 700,
                textTransform: 'uppercase', letterSpacing: '0.02em',
              }}>{city.name}</div>
              <div style={{
                fontFamily: DW.mono, fontSize: 9, color: 'rgba(255,255,255,0.5)',
                letterSpacing: '0.12em', textTransform: 'uppercase',
              }}>{city.code} · {city.temp}° · {city.mood}</div>
            </div>
            <div style={{ textAlign: 'right' }}>
              {bestDrug ? (
                <>
                  <div style={{
                    fontFamily: DW.display, fontSize: 13, fontWeight: 800, color: DW.good,
                  }}>+{fmt(bestDelta)}</div>
                  <div style={{
                    fontFamily: DW.mono, fontSize: 8, color: 'rgba(255,255,255,0.5)',
                    letterSpacing: '0.1em', textTransform: 'uppercase',
                  }}>per {drugOf(bestDrug).name}</div>
                </>
              ) : (
                <div style={{ fontFamily: DW.mono, fontSize: 9, color: 'rgba(255,255,255,0.3)',
                              letterSpacing: '0.1em' }}>—</div>
              )}
            </div>
            <div style={{
              fontFamily: DW.mono, fontSize: 9, color: here ? DW.lime : 'rgba(255,255,255,0.5)',
              textAlign: 'right', letterSpacing: '0.1em',
            }}>{here ? 'HERE' : `→`}</div>
          </button>
        );
      })}
    </div>
  );
}

function PhoneScreen({ state, dispatch }) {
  React.useEffect(() => {
    // Mark all read when they open the phone

    if (unread) {
      const t = setTimeout(() => dispatch({ type: 'MARK_READ' }), 600);
      return () => clearTimeout(t);

          <RevealRow label="Debt" value={fmtFull(state.debt)} color={DW.danger} shown={stage >= 1}/>
          <RevealRow label="Load" value={`${getLoad(state.inventory)} / ${state.trenchCapacity}`} color={DW.magenta} shown={stage >= 2}/>
          <RevealRow label="Heat" value={state.heat} color={DW.gold} shown={stage >= 2}/>
          <div style={{ gridColumn: '1 / span 2',
                        paddingTop: 10, borderTop: '1px solid rgba(255,255,255,0.1)' }}>
            <RevealRow
              label="Net worth"
              value={fmtFull(netWorth)}
              color={netWorth >= 0 ? DW.good : DW.danger}
              big
              shown={stage >= 3}
            />
          </div>
        </div>

        {/* Recent log */}
        <div style={{ marginBottom: 20 }}>
          <div style={{
            fontFamily: DW.mono, fontSize: 9, letterSpacing: '0.2em',
            color: 'rgba(255,255,255,0.5)', textTransform: 'uppercase',
            marginBottom: 8,
          }}>Recent chatter</div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>
            {recent.map((l, i) => (
              <div key={i} style={{
                fontFamily: DW.mono, fontSize: 11, color: 'rgba(255,255,255,0.7)',
                padding: '4px 0', borderLeft: `2px solid ${logColor(l.kind)}`,
                paddingLeft: 10,
                opacity: stage >= 3 ? 1 : 0,
                transition: `opacity 400ms ${i * 120}ms`,
              }}>
                <span style={{ color: 'rgba(255,255,255,0.4)', marginRight: 6 }}>D{l.day}</span>
                {l.text}
              </div>
            ))}
          </div>
        </div>

        <div style={{ marginTop: 'auto', display: 'flex', flexDirection: 'column', gap: 8 }}>
          <NeonBtn
            color={DW.lime}
            onClick={() => { DWAudio.confirm(); dispatch({ type: 'GOTO', screen: 'market' }); }}
            style={{ width: '100%' }}
          >▸ Hit the Market</NeonBtn>
          <NeonBtn
            color={DW.cyan}
            ghost
            small
            onClick={() => { DWAudio.tap(); dispatch({ type: 'GOTO', screen: 'phone' }); }}
            style={{ width: '100%' }}
          >Check messages ({state.messages.filter(m => !m.read).length})</NeonBtn>
        </div>
      </div>
    </div>
  );
}

function RevealRow({ label, value, color, shown, big }) {
  return (
    <div style={{
      opacity: shown ? 1 : 0, transform: shown ? 'translateY(0)' : 'translateY(8px)',
      transition: 'all 400ms cubic-bezier(0.34, 1.56, 0.64, 1)',
    }}>
      <div style={{
        fontFamily: DW.mono, fontSize: 9, letterSpacing: '0.14em',
        color: 'rgba(255,255,255,0.5)', textTransform: 'uppercase',
      }}>{label}</div>
      <div style={{
        fontFamily: DW.display, fontSize: big ? 32 : 18, fontWeight: 800,
        color: '#fff', textShadow: `0 0 ${big ? 18 : 10}px ${color}`,
        marginTop: 2,
      }}>{value}</div>
    </div>
  );
}

function logColor(kind) {
  return {
    buy: DW.cyan, sell: DW.lime, travel: DW.magenta,
    good: DW.good, bad: DW.danger, ok: DW.gold, debt: DW.danger,
    intro: DW.cyan,
  }[kind] || DW.magenta;
}

// ═══════════════════════════════════════════════════════
// proto-app.jsx
// ═══════════════════════════════════════════════════════
// ═══════════════════════════════════════════════════════════
// proto-app.jsx — router, responsive shell, Tweaks panel
// ═══════════════════════════════════════════════════════════

const TWEAKS = /*EDITMODE-BEGIN*/{
  "marketLayout": "list",
  "mapVariant": "stylized",
  "muted": false
}/*EDITMODE-END*/;

function ProtoApp() {
  const [state, dispatch] = React.useReducer(storeReducer, null, makeInitialState);
  const [trade, setTrade] = React.useState(null);   // { drugId }
  const [tweaksOpen, setTweaksOpen] = React.useState(false);
  const [tweaks, setTweaks] = React.useState(TWEAKS);
  const [editAvailable, setEditAvailable] = React.useState(false);
  const [toast, setToast] = React.useState(null);
  const [vw, setVw] = React.useState(() => window.innerWidth);

  React.useEffect(() => {
    const fn = () => setVw(window.innerWidth);
    window.addEventListener('resize', fn);
    return () => window.removeEventListener('resize', fn);
  }, []);

  const isDesktop = vw >= 1024;

  // Persist state
  React.useEffect(() => {
    try {
      const saved = localStorage.getItem('dw-proto-state');
      if (saved) {
        const parsed = JSON.parse(saved);
        if (parsed && parsed.screen) {
          dispatch({ type: '__LOAD', state: parsed });
        }
      }
    } catch (e) {}
  }, []);
  React.useEffect(() => {
    try {
      localStorage.setItem('dw-proto-state', JSON.stringify(state));
    } catch (e) {}
  }, [state]);

  // Tweak-mode protocol
  React.useEffect(() => {
    const handler = (e) => {
      if (!e.data || typeof e.data !== 'object') return;
      if (e.data.type === '__activate_edit_mode') setTweaksOpen(true);
      if (e.data.type === '__deactivate_edit_mode') setTweaksOpen(false);
    };
    window.addEventListener('message', handler);
    try { window.parent.postMessage({ type: '__edit_mode_available' }, '*'); } catch (e) {}
    setEditAvailable(true);
    return () => window.removeEventListener('message', handler);
  }, []);

  // Sync mute
  React.useEffect(() => {
    DWAudio.setMuted(!!tweaks.muted);
  }, [tweaks.muted]);

  const updateTweak = (k, v) => {
    const next = { ...tweaks, [k]: v };
    setTweaks(next);
    try { window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [k]: v } }, '*'); } catch (e) {}
  };

  // Notify user when messages arrive
  const msgsUnread = state.messages.filter(m => !m.read).length;
  const prevUnreadRef = React.useRef(msgsUnread);
  React.useEffect(() => {
    if (msgsUnread > prevUnreadRef.current) {
      DWAudio.buzz();
      setToast('📱 New message');
    }
    prevUnreadRef.current = msgsUnread;
  }, [msgsUnread]);

  const openTrade = (drugId) => setTrade({ drugId });
  const closeTrade = () => setTrade(null);

  const navigate = (screen) => { setTrade(null); dispatch({ type: 'GOTO', screen }); };

  // Screen router
  const screenContent = (() => {
    switch (state.screen) {
      case 'intro':
        return <IntroScreen onStart={() => dispatch({ type: 'START_GAME' })}/>;
      case 'market':
        return <MarketScreen state={state} dispatch={dispatch} onOpenTrade={openTrade} layout={tweaks.marketLayout}/>;
      case 'inventory':
        return <InventoryScreen state={state} dispatch={dispatch} onOpenTrade={openTrade}/>;
      case 'travel':
        return <TravelScreen state={state} dispatch={dispatch} mapVariant={tweaks.mapVariant}/>;
      case 'event':
        return <EventScreen state={state} dispatch={dispatch}/>;
      case 'phone':
        return <PhoneScreen state={state} dispatch={dispatch}/>;
      case 'endOfDay':
        return <EndOfDayScreen state={state} dispatch={dispatch}/>;
      case 'granny':
        return <GrannyScreen state={state} dispatch={dispatch}/>;
      case 'stripped':
        return <StrippedScreen state={state} dispatch={dispatch}/>;
      case 'gameover':
        return <GameOverScreen state={state} dispatch={dispatch}/>;
      default:
        return <IntroScreen onStart={() => dispatch({ type: 'START_GAME' })}/>;
    }
  })();

  // Show bottom nav on gameplay screens
  const showNav = ['market', 'inventory', 'travel', 'phone'].includes(state.screen);
  const showStatus = !['event', 'intro', 'gameover', 'endOfDay', 'granny', 'stripped'].includes(state.screen);

  const gameContent = (
    <div style={{ position: 'absolute', inset: 0, background: '#000', overflow: 'hidden' }}>
      <UIStyles/>
      <MusicPlayer muted={tweaks.muted} onMuteToggle={() => updateTweak('muted', !tweaks.muted)} gameStarted={state.screen !== 'intro'}/>
      {screenContent}
      {showNav && <BottomNav screen={state.screen} onNavigate={navigate} messagesUnread={msgsUnread}/>}
      <TradeSheet state={state} tradeCtx={trade} dispatch={dispatch} onClose={closeTrade}/>
      <Toast msg={toast} onDone={() => setToast(null)}/>

      {/* Reset floating button */}
      {state.screen !== 'intro' && (
        <button
          onClick={() => {
            if (confirm('Reset the game?')) {
              DWAudio.stopAmbient();
              dispatch({ type: 'RESET' });
            }
          }}
          style={{
            position: 'absolute', top: 58, left: 6, zIndex: 100,
            background: 'rgba(10,1,24,0.6)', border: `1px solid ${DW.danger}55`,
            color: '#fff', width: 22, height: 22, borderRadius: '50%',
            fontSize: 11, cursor: 'pointer', padding: 0,
            fontFamily: DW.mono,
          }}
          title="Reset game"
        >⟲</button>
      )}
    </div>
  );

  return (
    <div style={{
      position: 'fixed', inset: 0,
      background: `radial-gradient(ellipse at 30% 20%, #2a0d4e 0%, #0a0118 60%)`,
      display: isDesktop ? 'flex' : 'block',
      alignItems: isDesktop ? 'center' : undefined,
      justifyContent: isDesktop ? 'center' : undefined,
      overflow: 'hidden',
    }}>
      <ResponsiveShell vw={vw}>{gameContent}</ResponsiveShell>

      {tweaksOpen && (
        <TweaksPanel tweaks={tweaks} onChange={updateTweak} onClose={() => setTweaksOpen(false)}/>
      )}

      {isDesktop && (
        <div style={{
          position: 'fixed', top: 14, left: 14, zIndex: 200,
          fontFamily: DW.mono, fontSize: 10, color: 'rgba(255,255,255,0.4)',
          letterSpacing: '0.16em', textTransform: 'uppercase',
        }}>
          DOPE WARS: VICE EDITION
        </div>
      )}
    </div>
  );
}

function TweaksPanel({ tweaks, onChange, onClose }) {
  return (
    <div style={{
      position: 'fixed', top: 14, right: 14, zIndex: 300,
      width: 260, background: 'rgba(10,1,24,0.95)',
      border: `1px solid ${DW.magenta}`, borderRadius: 6,
      padding: 14, color: '#fff', fontFamily: DW.body,
      backdropFilter: 'blur(12px)', WebkitBackdropFilter: 'blur(12px)',
      boxShadow: `0 0 40px ${DW.magenta}55`,
    }}>
      <div style={{
        display: 'flex', justifyContent: 'space-between', alignItems: 'center',
        marginBottom: 12, paddingBottom: 8,
        borderBottom: `1px solid ${DW.magenta}44`,
      }}>
        <div style={{
          fontFamily: DW.display, fontWeight: 800, fontSize: 14,
          textTransform: 'uppercase', letterSpacing: '0.1em',
          textShadow: `0 0 10px ${DW.magenta}`,
        }}>Tweaks</div>
        <button onClick={onClose} style={{
          background: 'transparent', border: 'none', color: '#fff',
          fontSize: 16, cursor: 'pointer',
        }}>×</button>
      </div>

      <TweakSelect
        label="Market layout"
        value={tweaks.marketLayout}
        options={[
          { val: 'list', label: 'List' },
          { val: 'grid', label: 'Grid' },
          { val: 'ticker', label: 'Ticker' },
        ]}
        onChange={v => onChange('marketLayout', v)}
      />
      <TweakSelect
        label="Map variant"
        value={tweaks.mapVariant}
        options={[
          { val: 'stylized', label: 'Stylized cards' },
          { val: 'grid', label: 'Data list' },
          { val: 'routes', label: 'Route map' },
        ]}
        onChange={v => onChange('mapVariant', v)}
      />
      <TweakToggle

}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <div style={{ marginBottom: 12 }}>
      <div style={{
        fontFamily: DW.mono, fontSize: 9, letterSpacing: '0.14em',
        color: 'rgba(255,255,255,0.5)', textTransform: 'uppercase',
        marginBottom: 5,
      }}>{label}</div>
      <div style={{ display: 'flex', gap: 4 }}>
        {options.map(o => (
          <button
            key={o.val}
            onClick={() => onChange(o.val)}
            style={{
              flex: 1, padding: '7px 4px',
              background: value === o.val ? `${DW.magenta}33` : 'rgba(255,255,255,0.03)',
              border: `1px solid ${value === o.val ? DW.magenta : 'rgba(255,255,255,0.1)'}`,
              color: '#fff', fontFamily: DW.display, fontWeight: 700,
              fontSize: 10, textTransform: 'uppercase', letterSpacing: '0.06em',
              borderRadius: 2, cursor: 'pointer',
              boxShadow: value === o.val ? `0 0 12px ${DW.magenta}66` : 'none',
            }}
          >{o.label}</button>
        ))}
      </div>
    </div>
  );
}
function TweakToggle({ label, value, onChange }) {
  return (
    <div style={{ display: 'flex', justifyContent: 'space-between',
                  alignItems: 'center', marginBottom: 12 }}>
      <div style={{
        fontFamily: DW.mono, fontSize: 10, letterSpacing: '0.12em',
        color: 'rgba(255,255,255,0.75)', textTransform: 'uppercase',
      }}>{label}</div>
      <button onClick={() => onChange(!value)}
        style={{
          width: 40, height: 22, borderRadius: 11, padding: 2,
          background: value ? DW.magenta : 'rgba(255,255,255,0.12)',
          border: `1px solid ${value ? DW.magenta : 'rgba(255,255,255,0.2)'}`,
          cursor: 'pointer', transition: 'all 200ms',
          boxShadow: value ? `0 0 10px ${DW.magenta}88` : 'none',
        }}
      >
        <div style={{
          width: 16, height: 16, borderRadius: '50%',
          background: '#fff',
          transform: value ? 'translateX(18px)' : 'translateX(0)',
          transition: 'transform 200ms',
        }}/>
      </button>
    </div>
  );
}

Object.assign(window, { ProtoApp });

// Responsive shell — no phone frame, adapts to viewport
function ResponsiveShell({ vw, children }) {
  // Mobile: full screen
  if (vw < 640) {
    return (
      <div style={{ position: 'absolute', inset: 0, overflow: 'hidden', background: '#000' }}>
        {children}
      </div>
    );
  }
  // Tablet: full screen
  if (vw < 1024) {
    return (
      <div style={{ position: 'absolute', inset: 0, overflow: 'hidden', background: '#000' }}>
        {children}
      </div>
    );
  }
  // Desktop: centered card with background visible on sides
  const cardW = Math.min(820, vw - 80);
  const cardH = Math.min(window.innerHeight - 48, 960);
  return (
    <div style={{
      width: cardW, height: cardH,
      position: 'relative', overflow: 'hidden',
      background: '#000',
      borderRadius: 16,
      border: '1px solid rgba(255,255,255,0.1)',
      boxShadow: `0 40px 120px rgba(0,0,0,0.8), 0 0 80px rgba(255,46,166,0.18), inset 0 1px 0 rgba(255,255,255,0.06)`,
    }}>
      {children}
    </div>
  );
}
Object.assign(window, { ResponsiveShell });

// Error boundary — catches render errors and shows a debug message instead of blank screen
class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(e) { return { error: e }; }
  render() {
    if (this.state.error) {
      return (
        <div style={{
          position: 'fixed', inset: 0, background: '#0a0118',
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          padding: 24,
        }}>
          <div style={{
            fontFamily: 'monospace', color: '#ff3366', maxWidth: 600,
            background: 'rgba(255,51,102,0.1)', border: '1px solid #ff3366',
            borderRadius: 8, padding: 24,
          }}>
            <div style={{ fontSize: 18, fontWeight: 700, marginBottom: 12 }}>
              💥 Runtime Error
            </div>
            <pre style={{ fontSize: 12, whiteSpace: 'pre-wrap', color: '#fff', opacity: 0.85 }}>
              {String(this.state.error)}
            </pre>
          </div>
        </div>
      );
    }
    return this.props.children;
  }
}

// Mount
const root = ReactDOM.createRoot(document.getElementById('proto-root'));
root.render(<ErrorBoundary><ProtoApp/></ErrorBoundary>);

</script>
